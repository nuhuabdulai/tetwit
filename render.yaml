# render.yaml - Render Web Service Configuration
# This file makes deployment to Render automatic!

services:
  - type: web
    name: tetwit
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm rebuild better-sqlite3 && node migrate-database.js
    startCommand: npm start
    healthCheckPath: /api/ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES
        value: "7d"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false